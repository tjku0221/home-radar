name: daily-scrape

on:
  schedule:
    - cron: '30 0 * * *'   # 台灣時間每天 08:30（UTC+8）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node scraper.js

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json data/listings.js
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d) 自動更新"
          git push
